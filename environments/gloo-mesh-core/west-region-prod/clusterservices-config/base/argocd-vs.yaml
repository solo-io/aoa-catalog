apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: argo-vs
  namespace: istio-gateways
spec:
  hosts:
  - "argo.west.gmc.glooplatform.com"
  gateways:
  - istio-gateways/https-gateway
  http:
  - name: argo-ui
    match:
    - uri:
        prefix: /
    route:
    - destination:
        host: argocd-server
        port:
          number: 443