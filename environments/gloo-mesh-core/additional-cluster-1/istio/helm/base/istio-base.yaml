apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  project: default
  source:
    chart: base
    repoURL: us-docker.pkg.dev/gloo-mesh/istio-a9ee4fe9f69a
    targetRevision: 1.22.0-solo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true