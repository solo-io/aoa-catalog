apiVersion: networking.gloo.solo.io/v2
kind: VirtualDestination
metadata:
  name: httpbin-blue-vd
  namespace: httpbin-blue
  labels:
    failover: "true"
    vd: httpbin-blue
spec:
  hosts:
  - httpbin-blue.randomvalue
  services:
  - labels:
      app: httpbin-blue
  ports:
    - number: 8000
      protocol: HTTP