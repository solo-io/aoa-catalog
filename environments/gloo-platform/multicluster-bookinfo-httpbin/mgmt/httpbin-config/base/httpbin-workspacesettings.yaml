apiVersion: admin.gloo.solo.io/v2
kind: WorkspaceSettings
metadata:
  name: httpbin
  namespace: httpbin-team-config
spec:
  exportTo:
  - workspaces:
    - name: ops-team
  importFrom:
  - workspaces:
    - name: ops-team
  options:
    serviceIsolation:
      enabled: false
      trimProxyConfig: false
    federation:                     
      enabled: true
      serviceSelector:
      - namespace: httpbin-blue
      - namespace: httpbin-green