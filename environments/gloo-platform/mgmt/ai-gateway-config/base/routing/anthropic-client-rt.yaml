apiVersion: networking.gloo.solo.io/v2
kind: RouteTable
metadata:
  name: anthropic-client-routetable
  namespace: ai-gateway-ws-config
spec:
  hosts:
    - 'anthropic-client.central.glooplatform.com'
  virtualGateways:
    - name: north-south-gw
      namespace: istio-gateways
      cluster: mgmt
  workloadSelectors: []
  http:
    - name: eli5-client
      labels:
        oauth: anthropic-client.central.glooplatform.com
      matchers:
      - uri:
          prefix: /eli5
      - uri:
          prefix: /callback
      forwardTo:
        destinations:
        - ref:
            name: anthropic-eli5-client
            namespace: ai-client
            cluster: glooplatform-central
          port:
            number: 5000