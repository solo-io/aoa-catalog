apiVersion: v1
kind: ServiceAccount
metadata:
  name: ubi8-public
  namespace: ubi8-public
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ubi8-public
  namespace: ubi8-public
  labels:
    version: v1
    app: ubi8-public
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubi8-public
      version: v1
  template:
    metadata:
      labels:
        app: ubi8-public
        version: v1
        istio.io/rev: 1-15
      annotations:
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      serviceAccountName: ubi8-public
      containers:
      - name: ubi8
        image: redhat/ubi8:latest
        ports:
        - containerPort: 80
        args:
          - /bin/sh
          - -c
          - sleep 360000
