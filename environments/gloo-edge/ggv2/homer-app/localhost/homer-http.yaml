apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: homer-http
  namespace: homer-portal
  labels:
    example: homer-route
    gateway: http
spec:
  parentRefs:
    - name: http
      namespace: gloo-system
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /solo
      backendRefs:
      - name: homer-portal
        port: 8080