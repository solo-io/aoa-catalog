apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: argocd-http
  namespace: argocd
  labels:
    example: argocd-route
    gateway: http
spec:
  parentRefs:
    - name: http
      namespace: gloo-system
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80