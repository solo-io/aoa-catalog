apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- rollouts-ui-deploy.yaml
- rbac.yaml
- routetable.yaml

# patch nodeSelector and tolerations on all Deployments
patches:
- patch: |-
    kind: not-important
    metadata:
      name: not-important
    spec:
      template:
        spec:
          nodeSelector:
            gke-spot: "true"
          tolerations:
          - key: cloud.google.com/gke-spot
            operator: Equal
            value: "true"
            effect: NoSchedule
  target:
    kind: Deployment