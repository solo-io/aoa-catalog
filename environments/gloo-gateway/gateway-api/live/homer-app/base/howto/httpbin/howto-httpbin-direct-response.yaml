apiVersion: gateway.gloo.solo.io/v1alpha1
kind: DirectResponse
metadata:
  name: howto-httpbin-direct-response
  namespace: homer-portal
spec:
  status: 200
  body: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Httpbin Demo Walkthrough</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            body { font-family: Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
            .parallax-container { display: flex; align-items: center; justify-content: center; height: 30vh; background: linear-gradient(45deg, #3498db, #9b59b6); color: #fff; text-align: center; position: relative; }
            .parallax-content { position: relative; z-index: 2; padding: 20px; }
            .parallax-bg { position: absolute; width: 100%; height: 100%; opacity: 0.5; z-index: 1; }
            h1 { font-size: 36px; margin-bottom: 20px; }
            h2 { font-size: 24px; margin-bottom: 10px; }
            .note { background-color: rgba(255, 255, 255, 0.9); border-radius: 8px; padding: 20px; margin: 20px 0; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
            .highlight { color: #3498db; font-weight: bold; }
            .icon { font-size: 32px; margin-right: 10px; color: #3498db; }
        </style>
    </head>
    <body>
        <div class="parallax-container">
            <div class="parallax-bg"></div>
            <div class="parallax-content">
                <h1>Httpbin Demo Walkthrough</h1>
            </div>
        </div>
        
        <div class="parallax-content">
            <div class="note">
                <h2><i class="icon fas fa-cogs"></i><span class="highlight">Application Description:</span></h2>
                <p>Httpbin is a simple HTTP service for testing and debugging HTTP clients. It demonstrates routing, security policies, and transformations.</p>
            </div>

            <div class="note">
                <h2><i class="icon fas fa-globe"></i><span class="highlight">Httpbin Public Endpoint:</span></h2>
                <p>This is the publicly accessible endpoint for httpbin, exposed through Gloo Gateway.</p>
            </div>

            <div class="note">
                <h2><i class="icon fas fa-lock"></i><span class="highlight">Ext Auth with Okta:</span></h2>
                <p>Securing httpbin with Okta and ExtAuthPolicy.</p>
                <ol>
                    <li>Navigate to the protected /get tile to be redirected to Okta.</li>
                    <li>Log in with jdoe@solo.io / gloo-dev.</li>
                    <li>Observe the id_token and access_token in headers.</li>
                    <li>Review the `httpbin-extauth` ExtAuthPolicy in Gloo Mesh UI > Policies.</li>
                </ol>
            </div>

            <div class="note">
                <h2><i class="icon fas fa-stopwatch"></i><span class="highlight">Rate Limiting:</span></h2>
                <p>Httpbin rate limiting is set to 1000 requests per minute.</p>
                <ol>
                    <li>Review the `httpbin` RateLimitPolicy in Gloo Mesh UI > Policies.</li>
                    <li>Confirm it is applied to the httpbin-rt-443 route.</li>
                </ol>
            </div>

            <div class="note">
                <h2><i class="icon fas fa-user-shield"></i><span class="highlight">JWT Validation, ClaimsToHeaders, and Transformations:</span></h2>
                <p>Using JWT validation and claims as headers.</p>
                <ol>
                    <li>See response headers at the /get endpoint.</li>
                    <li>Decode JWT to see `email` and `groups` claims.</li>
                    <li>Review `httpbin-claimstoheaders` JWTPolicy in Gloo Mesh UI > Policies.</li>
                    <li>Check `modify-x-email-header` TransformationPolicy for header manipulations.</li>
                </ol>
            </div>

            <div class="note">
                <h2><i class="icon fas fa-shield-alt"></i><span class="highlight">OPA AuthZ:</span></h2>
                <p>Configuring OPA for authorization with ExtAuthPolicy.</p>
                <ol>
                    <li>Review the `httpbin-extauth` ExtAuthPolicy in Gloo Mesh UI > Policies.</li>
                    <li>Check OPA rules in `httpbin-opa` configmap via Argo CD UI.</li>
                    <li>Test access to the /status/200 endpoint and observe a 403 error.</li>
                </ol>
            </div>

            <div class="note">
                <h2><i class="icon fas fa-shield"></i><span class="highlight">WAF policy:</span></h2>
                <p>Securing httpbin with a WAFPolicy based on OWASP Core Rule Set.</p>
                <ol>
                    <li>Review the `httpbin-waf` WAFPolicy in Gloo Mesh UI > Policies.</li>
                    <li>At the /get endpoint, inject User-Agent "scammer" and observe the WAF block.</li>
                </ol>
            </div>
        </div>

        <script>
            window.addEventListener('scroll', function () {
                var scrolled = window.scrollY;
                var parallaxBg = document.querySelector('.parallax-bg');
                parallaxBg.style.transform = 'translateY(' + scrolled * 0.5 + 'px)';
            });
        </script>
    </body>
    </html>
