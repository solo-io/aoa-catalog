apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homer-portal
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: homer-portal
  project: default
  source:
    chart: homer
    repoURL: https://djjudas21.github.io/charts/
    targetRevision: 8.1.9
    helm:
      values: |
        #
        # IMPORTANT NOTE
        #
        # This chart inherits from our common library chart. You can check the default values/options here:
        # https://github.com/k8s-at-home/library-charts/tree/main/charts/stable/common/values.yaml
        #

        controller:
          replicas: 1
        
        image:
          # -- image repository
          repository: ably77/homer
          # -- image tag
          tag: 0.1.0
          # -- image pull policy
          pullPolicy: Always
        
        # -- environment variables.
        # @default -- See below
        env:
          # -- Set the container timezone
          TZ: UTC
          # -- Specify the user ID the application will run as
          UID: "1001"
          # -- Specify the group ID the application will run as
          GID: "1001"
          # -- Specify the basepath the application will run at
          SUBFOLDER: /solo
        
        # -- Set the resource requests / limits for the main container.
        resources:
          requests:
            cpu: 30m
            memory: 128Mi
        
        # -- Set labels on the pod
        #podLabels:
        #  istio.io/rev: 1-23
        
        # -- Node selection constraint
        nodeSelector:
          node: "spot"

        # -- Specify taint tolerations  
        tolerations:
        - key: cloud.google.com/node
          operator: Equal
          value: "spot"
          effect: NoSchedule
        
        # -- Set annotations on the pod
        #podAnnotations:
        #  proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        
        # -- Configures serviceAccount settings for the chart.
        serviceAccount:
          # -- Specifies whether a service account should be created
          create: true
        
        # -- Configures service settings for the chart.
        # @default -- See values.yaml
        service:
          main:
            enabled: true
            primary: true
            type: ClusterIP
            ports:
              http:
                enabled: true
                port: 8080
                protocol: HTTP
                targetPort: 8080
            labels:
              expose: "true"
        
        ingress:
          # -- Enable and configure ingress settings for the chart under this key.
          # @default -- See values.yaml
          main:
            enabled: false
        
        # -- Configure persistence settings for the chart under this key.
        # @default -- See values.yaml
        persistence:
          config:
            enabled: false
            mountPath: /www/assets
        
        configmap:
          config:
            # -- Store homer configuration as a ConfigMap
            enabled: true
            # -- Homer configuration. See [image documentation](https://github.com/bastienwirtz/homer/blob/main/docs/configuration.md) for more information.
            # @default -- See values.yaml
            data:
              config.yml: |
                #externalConfig: https://raw.githubusercontent.com/bastienwirtz/homer/main/public/assets/config.yml.dist
                ---
                # Homepage configuration
                # See https://fontawesome.com/v5/search for icons options
                
                title: "Gloo Gateway Demo Dashboard"
                subtitle: "Next-gen API Gateway built on Envoy proxy"
                logo: "solo/glooy.png"
                # icon: "fas fa-skull-crossbones" # Optional icon
                
                header: true
                #footer: '<p>Created with <span class="has-text-danger">❤️</span> with <a href="https://bulma.io/">bulma</a>, <a href="https://vuejs.org/">vuejs</a> & <a href="https://fontawesome.com/">font awesome</a> // Fork me on <a href="https://github.com/bastienwirtz/homer"><i class="fab fa-github-alt"></i></a></p>' # set false if you want to hide it.
                footer: false

                # Set the default layout and color scheme
                defaults:
                  layout: list # Either 'columns', or 'list'
                  colorTheme: dark # One of 'auto', 'light', or 'dark'
        
                # Optional theme customization
                theme: default
                colors:
                  light:
                    highlight-primary: "#5bb5de"
                    highlight-secondary: "#51a4d0"
                    highlight-hover: "#51a4d0"
                    background: "#f5f5f5"
                    card-background: "#ffffff"
                    text: "#363636"
                    text-header: "#ffffff"
                    text-title: "#303030"
                    text-subtitle: "#424242"
                    card-shadow: rgba(0, 0, 0, 0.1)
                    link: "#5bb5de"
                    link-hover: "#4fbc45"
                  dark:
                    highlight-primary: "#5bb5de"
                    highlight-secondary: "#51a4d0"
                    highlight-hover: "#51a4d0"
                    background: "#131313"
                    card-background: "#2b2b2b"
                    text: "#eaeaea"
                    text-header: "#ffffff"
                    text-title: "#fafafa"
                    text-subtitle: "#f5f5f5"
                    card-shadow: rgba(0, 0, 0, 0.4)
                    link: "#5bb5de"
                    link-hover: "#4fbc45"
                
                # Optional message
                message:
                  #url: https://b4bz.io
                  style: "is-dark" # See https://bulma.io/documentation/components/message/#colors for styling options.
                  title: "Welcome!"
                  icon: "fa fa-grin"
                  content: |

                    This is a simple navigation homepage for aoa-catalog demo apps running on Gloo Gateway!<br />
                    Find more information on <a href='https://github.com/solo-io/aoa-catalog'>github.com/solo-io/aoa-catalog</a><br /><br />
                                        
                    Bookinfo API key auth:<br />
                    bookinfo-key: N2YwMDIxZTEtNGUzNS1jNzgzLTRkYjAtYjE2YzRkZGVmNjcy<br />
                    
                    Below are a few common usernames to explore the applications and portals:<br />
                    Note: You can also sign up for your own user through Okta using self-service registration!<br /><br />
                    Username: jdoe@solo.io // Password: gloo-dev<br />
                    Username: jdoe@gmail.com // Password: gloo-public<br /><br />
                    Common headers used in demos:<br /><br />

                    Used in JWT auth example:<br />
                    TOKEN=$(curl https://raw.githubusercontent.com/solo-io/gloo-mesh-use-cases/main/gloo-gateway/jwt/dev-example.jwt -s) && echo "$TOKEN"<br />
                    x-auth: Bearer ${TOKEN}<br /><br />

                    Used in dark launch example:<br />
                    user: preview<br /><br />
                    
                    Used in WAF example:<br />
                    user-agent: user1-5<br />
                    user-agent: user6<br />
                    user-agent: scammer<br /><br />
                
                # Optional navbar
                # links: [] # Allows for navbar (dark mode, layout, and search) without any links
                links:
                  - name: "Github Repo"
                    icon: "fab fa-github"
                    url: "https://github.com/solo-io/aoa-catalog"
                    target: "_blank" # optional html a tag target attribute
                  #- name: "Gloo Mesh Documentation"
                  #  icon: "fas fa-book"
                  #  url: "https://docs.solo.io/gloo-mesh-enterprise"
                  #  target: "_blank" # optional html a tag target attribute
                  - name: "Gloo Gateway Documentation"
                    icon: "fas fa-book"
                    url: "https://docs.solo.io/gateway/latest/"
                    target: "_blank" # optional html a tag target attribute
                  - name: "Gloo AI Gateway Documentation"
                    icon: "fas fa-book"
                    url: "https://docs.solo.io/gateway/main/ai/overview/"
                    target: "_blank" # optional html a tag target attribute
                  # this will link to a second homer page that will load config from additional-page.yml and keep default config values as in config.yml file
                  # see url field and assets/additional-page.yml.dist used in this example:
                  #- name: "another page!"
                  #  icon: "fas fa-file-alt"
                  #  url: "#additional-page" 
                
                # Services
                # First level array represent a group.
                # Leave only a "items" key if not using group (group name, icon & tagstyle are optional, section separation will not be displayed).
                services:
                  - name: "Admin Applications"
                    icon: "fas fa-user-cog"
                    items:
                      - name: "ArgoCD"
                        subtitle: "admin // solo.io"
                        icon: "fab fa-git-alt"
                        tag: "argo"
                        keywords: "argocd"
                        url: "https://argocd.ggv2.glooplatform.com/argo"
                        target: "_blank" # optional html a tag target attribute

                  - name: "AI Gateway Workloads"
                    icon: "fas fa-brain"
                    items:
                      - name: "Language Translator Chatbot"
                        subtitle: "example client"
                        icon: "fas fa-language"
                        tag: "ai-gateway"
                        url: "https://language-chatbot.ggv2.glooplatform.com"
                        target: "_blank" # optional html a tag target attribute
                      - name: "BetterChatGPT Chatbot"
                        subtitle: "example client"
                        icon: "far fa-question-circle"
                        tag: "ai-gateway"
                        url: "https://chat.ggv2.glooplatform.com/"
                        target: "_blank" # optional html a tag target attribute
                      - name: "AI - Prompt Guard"
                        subtitle: "config example"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/aigw-config/base/openai/openai-targetref-options.yaml#L13-L21"
                        target: "_blank" # optional html a tag target attribute
                      - name: "AI - Prompt Enrichment"
                        subtitle: "config example"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/aigw-config/base/openai/openai-targetref-options.yaml#L22-L56"
                        target: "_blank" # optional html a tag target attribute
                        
                  - name: "Demo Web Applications"
                    icon: "fas fa-cloud"
                    items:
                      - name: "httpbin"
                        subtitle: "requires oidc login through okta"
                        icon: "far fa-window-maximize"
                        tag: "httpbin"
                        url: "https://httpbin.ggv2.glooplatform.com"
                        target: "_blank" # optional html a tag target attribute
                      
                      - name: "Bookinfo"
                        subtitle: "requires bookinfo-key and x-token header"
                        icon: "fas fa-book-reader"
                        tag: "bookinfo"
                        url: "https://bookinfo.ggv2.glooplatform.com/productpage"
                        target: "_blank" # optional html a tag target attribute
                      
                
                  - name: "Demo Traffic Routing and Shifting Capabilities"
                    icon: "fas fa-traffic-light"
                    items:
                      - name: "Timeout Policy - 2s"
                        subtitle: "switch to /delay/2 to trigger timeout"
                        icon: "fas fa-book-reader"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://httpbin.ggv2.glooplatform.com/delay/0"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Dark Launch - bookinfo reviews-v2"
                        subtitle: "requires user: preview, bookinfo-key, x-token header"
                        icon: "fas fa-book-reader"
                        tag: "gloo-gateway #gloo-mesh #demo"
                        keywords: "gloo-gateway,gloo-mesh,demo"
                        url: "https://bookinfo.ggv2.glooplatform.com/reviews/2"
                        target: "_blank" # optional html a tag target attribute
                  
                  - name: "Configuration Examples"
                    icon: "far fa-file-code"
                    items:
                      - name: "Deploy with GitOps"
                        subtitle: "ArgoCD Application with Helm"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/gloo-enterprise-app/base/gloo-enterprise.yaml"
                        target: "_blank" # optional html a tag target attribute
                      - name: "TLS Termination"
                        subtitle: "terminate TLS at Gloo Gateway"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/gateway-api-config/base/gateway-https.yaml#L14-L18"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Host Rewrite"
                        subtitle: "rewrite host path"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/aigw-config/base/openai/openai-route-policies.yaml#L8"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Path Rewrite"
                        subtitle: "rewrite prefix path"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/aigw-config/base/openai/openai-route-policies.yaml#L9"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Route Delegation"
                        subtitle: "parent delegating to child HTTPRoute"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/httpbin-app/base/httpbin-parent-route.yaml#L16-L20"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Weighted Destinations"
                        subtitle: "shift traffic by weight"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/httpbin-app/base/httpbin-delegate-route.yaml#L12-L18"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Timeout Policy"
                        subtitle: "configure timeouts"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/httpbin-app/base/httpbin-route-policies.yaml#L10"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Dark Launch"
                        subtitle: "dark launch by host header"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/bookinfo-app/base/bookinfo-delegate-route.yaml#L8-L20"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Header Manipulation"
                        subtitle: "add/remove headers"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/httpbin-app/base/httpbin-route-policies.yaml#L15-L23"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Conditional Transformations"
                        subtitle: "response transformation example"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/httpbin-app/base/httpbin-route-policies.yaml#L28-L35"
                        target: "_blank" # optional html a tag target attribute
                      - name: "WAF"
                        subtitle: "deny access based on modsecurity rules"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/httpbin-app/base/httpbin-route-policies.yaml#L36-L100"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Rate Limiting"
                        subtitle: "basic rate limit example"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/httpbin-app/base/httpbin-ratelimit-config.yaml"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Oauth2 AuthConfig"
