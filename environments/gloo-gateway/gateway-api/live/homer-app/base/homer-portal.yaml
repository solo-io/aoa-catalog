                        icon: "far fa-file-code"
                        tag: "gloo-gateway #demo"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/aigw-config/base/openai/openai-route-policies.yaml#L12-L26"
