apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homer-portal
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: homer-portal
  project: default
  source:
    chart: homer
    repoURL: https://djjudas21.github.io/charts/
    targetRevision: 8.1.9
    helm:
      values: |
        #
        # IMPORTANT NOTE
        #
        # This chart inherits from our common library chart. You can check the default values/options here:
        # https://github.com/k8s-at-home/library-charts/tree/main/charts/stable/common/values.yaml
        #

        controller:
          replicas: 1
        
        image:
          # -- image repository
          repository: ably77/homer
          # -- image tag
          tag: 0.1.0
          # -- image pull policy
          pullPolicy: Always
        
        # -- environment variables.
        # @default -- See below
        env:
          # -- Set the container timezone
          TZ: UTC
          # -- Specify the user ID the application will run as
          UID: "1001"
          # -- Specify the group ID the application will run as
          GID: "1001"
          # -- Specify the basepath the application will run at
          SUBFOLDER: /solo
        
        # -- Set the resource requests / limits for the main container.
        resources:
          requests:
            cpu: 30m
            memory: 128Mi
        
        # -- Set labels on the pod
        #podLabels:
        #  istio.io/rev: 1-23
        
        # -- Node selection constraint
        nodeSelector:
          node: "spot"

        # -- Specify taint tolerations  
        tolerations:
        - key: cloud.google.com/node
          operator: Equal
          value: "spot"
          effect: NoSchedule
        
        # -- Set annotations on the pod
        #podAnnotations:
        #  proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        
        # -- Configures serviceAccount settings for the chart.
        serviceAccount:
          # -- Specifies whether a service account should be created
          create: true
        
        # -- Configures service settings for the chart.
        # @default -- See values.yaml
        service:
          main:
            enabled: true
            primary: true
            type: ClusterIP
            ports:
              http:
                enabled: true
                port: 8080
                protocol: HTTP
                targetPort: 8080
            labels:
              expose: "true"
        
        ingress:
          # -- Enable and configure ingress settings for the chart under this key.
          # @default -- See values.yaml
          main:
            enabled: false
        
        # -- Configure persistence settings for the chart under this key.
        # @default -- See values.yaml
        persistence:
          config:
            enabled: false
            mountPath: /www/assets
        
        configmap:
          config:
            # -- Store homer configuration as a ConfigMap
            enabled: true
            # -- Homer configuration. See [image documentation](https://github.com/bastienwirtz/homer/blob/main/docs/configuration.md) for more information.
            # @default -- See values.yaml
            data:
              config.yml: |
                #externalConfig: https://raw.githubusercontent.com/bastienwirtz/homer/main/public/assets/config.yml.dist
                ---
                # Homepage configuration
                # See https://fontawesome.com/v5/search for icons options
                
                title: "Gloo Gateway Demo Dashboard"
                subtitle: "Next-gen API Gateway built on Envoy proxy"
                logo: "solo/glooy.png"
                # icon: "fas fa-skull-crossbones" # Optional icon
                
                header: true
                #footer: '<p>Created with <span class="has-text-danger">❤️</span> with <a href="https://bulma.io/">bulma</a>, <a href="https://vuejs.org/">vuejs</a> & <a href="https://fontawesome.com/">font awesome</a> // Fork me on <a href="https://github.com/bastienwirtz/homer"><i class="fab fa-github-alt"></i></a></p>' # set false if you want to hide it.
                footer: false

                columns: '3'

                # Set the default layout and color scheme
                defaults:
                  layout: list # Either 'columns', or 'list'
                  colorTheme: dark # One of 'auto', 'light', or 'dark'
        
                # Optional theme customization
                theme: default
                colors:
                  light:
                    highlight-primary: "#5bb5de"
                    highlight-secondary: "#51a4d0"
                    highlight-hover: "#51a4d0"
                    background: "#f5f5f5"
                    card-background: "#ffffff"
                    text: "#363636"
                    text-header: "#ffffff"
                    text-title: "#303030"
                    text-subtitle: "#424242"
                    card-shadow: rgba(0, 0, 0, 0.1)
                    link: "#5bb5de"
                    link-hover: "#4fbc45"
                  dark:
                    highlight-primary: "#5bb5de"
                    highlight-secondary: "#51a4d0"
                    highlight-hover: "#51a4d0"
                    background: "#131313"
                    card-background: "#2b2b2b"
                    text: "#eaeaea"
                    text-header: "#ffffff"
                    text-title: "#fafafa"
                    text-subtitle: "#f5f5f5"
                    card-shadow: rgba(0, 0, 0, 0.4)
                    link: "#5bb5de"
                    link-hover: "#4fbc45"
                
                # Optional message
                message:
                  #url: https://b4bz.io
                  style: "is-dark" # See https://bulma.io/documentation/components/message/#colors for styling options.
                  title: "Welcome!"
                  icon: "fa fa-grin"
                  content: |
                    <p>This is a simple navigation homepage for the aoa-catalog demo apps running on Gloo Gateway!</p>
                    
                    <p>Find more information on <a href='https://github.com/solo-io/aoa-catalog' target="_blank">GitHub: solo-io/aoa-catalog</a></p>
                    
                    <h2>Common Usernames</h2>
                    <p>Below are a few common usernames to explore the applications and portals:</p>
                    <pre><code>Username: jdoe@solo.io   // Password: gloo-dev
                    Username: jdoe@gmail.com // Password: gloo-public</code></pre>
                    <p>Note: You can also sign up for your own user through Okta using self-service registration!</p>
                
                    <h2>Common Headers Used in Demos</h2>
                    <p>Below are headers commonly used in demo applications (typically also shown in the subtitle of the link card):</p>
                    <br />
                
                    <h3>Bookinfo API-Key Auth header</h3>
                    <pre><code>bookinfo-key: N2YwMDIxZTEtNGUzNS1jNzgzLTRkYjAtYjE2YzRkZGVmNjcy</code></pre>
                    <br />
                
                    <h3>JWT Authentication Example</h3>
                    <p>Run the following command to retrieve the JWT header:</p>
                    <pre><code>TOKEN=$(curl https://raw.githubusercontent.com/solo-io/gloo-mesh-use-cases/main/gloo-gateway/jwt/dev-example.jwt -s) && echo "x-token: $TOKEN"</code></pre>
                    <br />
                
                    <h3>Dark Launch Example</h3>
                    <pre><code>user: preview</code></pre>
                    <br />
                
                    <h3>WAF Example</h3>
                    <p>Here are some common user-agent headers that will trigger modsecurity rules:</p>
                    <pre><code>user-agent: user1-5
                    user-agent: user6
                    user-agent: scammer</code></pre>

                
                # Optional navbar
                # links: [] # Allows for navbar (dark mode, layout, and search) without any links
                links:
                  - name: "Github Repo"
                    icon: "fab fa-github"
                    url: "https://github.com/solo-io/aoa-catalog"
                    target: "_blank" # optional html a tag target attribute
                  #- name: "Gloo Mesh Documentation"
                  #  icon: "fas fa-book"
                  #  url: "https://docs.solo.io/gloo-mesh-enterprise"
                  #  target: "_blank" # optional html a tag target attribute
                  - name: "Gloo Gateway Documentation"
                    icon: "fas fa-book"
                    url: "https://docs.solo.io/gateway/latest/"
                    target: "_blank" # optional html a tag target attribute
                  - name: "Gloo AI Gateway Documentation"
                    icon: "fas fa-book"
                    url: "https://docs.solo.io/gateway/main/ai/overview/"
                    target: "_blank" # optional html a tag target attribute
                  # this will link to a second homer page that will load config from additional-page.yml and keep default config values as in config.yml file
                  # see url field and assets/additional-page.yml.dist used in this example:
                  #- name: "another page!"
                  #  icon: "fas fa-file-alt"
                  #  url: "#additional-page" 
                
                # Services
                # First level array represent a group.
                # Leave only a "items" key if not using group (group name, icon & tagstyle are optional, section separation will not be displayed).
                services:

                  - name: "Demo AI Gateway Capabilities"
                    icon: "fas fa-brain"
                    items:
                      - name: "BetterChatGPT Chatbot"
                        subtitle: "use https://llm.gwapi.glooplatform.com/openai"
                        icon: "far fa-question-circle"
                        tag: "ai-gateway"
                        url: "https://chat.gwapi.glooplatform.com/"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Language Translator Chatbot"
                        subtitle: "requires x-token header with valid JWT"
                        icon: "fas fa-language"
                        tag: "ai-gateway"
                        url: "https://language-chatbot.gwapi.glooplatform.com"
                        target: "_blank" # optional html a tag target attribute
                      
                  
                  - name: "AI Gateway Demo Config Examples"
                    icon: "far fa-file-code"
                    items:
                      - name: "Deploy the AI Gateway"
                        subtitle: "example using kind: Gateway"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #config"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/aigw-config/base/ai-gateway.yaml"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Configure OpenAI Upstream"
                        subtitle: "api-key can be referenced by gateway"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #config"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/aigw-config/base/openai/openai-upstream.yaml"
                        target: "_blank" # optional html a tag target attribute
                      - name: "Configure Route to LLM Upstream"
                        subtitle: "using kind: HTTPRoute"
                        icon: "far fa-file-code"
                        tag: "gloo-gateway #config"
                        keywords: "gloo-gateway,demo"
                        url: "https://github.com/solo-io/aoa-catalog/blob/glooplatform.com-2.6.x-active/environments/gloo-gateway/gateway-api/live/aigw-config/base/openai/openai-httproute.yaml"
                        target: "_blank" # optional html a tag target attribute
