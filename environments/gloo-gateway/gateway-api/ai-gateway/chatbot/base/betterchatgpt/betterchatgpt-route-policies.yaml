apiVersion: gateway.solo.io/v1
kind: RouteOption
metadata:
  name: betterchatgpt-route-policies
  namespace: ai-chatbot
spec:
  options:
    jwt:
      disable: true
    cors:
      allowOrigin:
        - https://betterchatgpt.ggv2.glooplatform.com/
        - https://openai.ggv2.glooplatform.com/
      allowHeaders:
        - "Content-Type"
        - "Authorization"
        - "Access-Control-Allow-Origin"
        - "api-key"
      allowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowCredentials: true
