apiVersion: security.policy.gloo.solo.io/v2
kind: CORSPolicy
metadata:
  name: external-portal-cors
  namespace: external-portal-config
spec:
  applyToRoutes:
  - route:
      labels:
        portal: external
  config:
    allowCredentials: true
    allowHeaders:
      - api-key
      - Authorization
      - accept
      - content-type
      - referer
      - user-agent
      - Access-Control-Allow-Origin
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
    allowOrigins:
      - prefix: 'https://solo-dev-portal-2.k8mesh.com'
      - prefix: 'https://backstage-2.k8mesh.com'
      - prefix: 'https://external-portal-2.k8mesh.com'